<svg width="680" height="500" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" style="background:#1a1a1a;font-family:sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5a5a5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Base modules row -->
  <text x="340" y="22" text-anchor="middle" fill="#555" font-size="10" font-weight="500">BASE MODULES</text>
  <rect x="100" y="30" width="100" height="36" rx="8" fill="#222" stroke="#444" stroke-width="0.5"/>
  <text x="150" y="50" text-anchor="middle" fill="#888" font-size="11" font-weight="500">ConfigModule</text>
  <rect x="290" y="30" width="100" height="36" rx="8" fill="#222" stroke="#444" stroke-width="0.5"/>
  <text x="340" y="50" text-anchor="middle" fill="#888" font-size="11" font-weight="500">AppModule</text>
  <rect x="480" y="30" width="100" height="36" rx="8" fill="#222" stroke="#444" stroke-width="0.5"/>
  <text x="530" y="50" text-anchor="middle" fill="#888" font-size="11" font-weight="500">DBModule</text>

  <!-- AppModule to ConfigModule -->
  <line x1="290" y1="48" x2="200" y2="48" stroke="#444" stroke-width="0.5" marker-end="url(#arr)"/>
  <!-- AppModule to DBModule -->
  <line x1="390" y1="48" x2="480" y2="48" stroke="#444" stroke-width="0.5" marker-end="url(#arr)"/>

  <!-- AppModule to UserModule -->
  <line x1="340" y1="66" x2="340" y2="120" stroke="#444" stroke-width="0.5" marker-end="url(#arr)"/>

  <!-- Business modules label -->
  <text x="340" y="112" text-anchor="middle" fill="#555" font-size="10" font-weight="500">BUSINESS MODULES</text>

  <!-- AuthModule -->
  <rect x="60" y="120" width="120" height="40" rx="8" fill="#1a2a1a" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="120" y="143" text-anchor="middle" fill="#5dcaa5" font-size="12" font-weight="500">AuthModule</text>

  <!-- UserModule -->
  <rect x="280" y="120" width="120" height="40" rx="8" fill="#1e1a3a" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="143" text-anchor="middle" fill="#afa9ec" font-size="12" font-weight="500">UserModule</text>

  <!-- ReportsModule -->
  <rect x="500" y="120" width="120" height="40" rx="8" fill="#222" stroke="#444" stroke-width="0.5"/>
  <text x="560" y="143" text-anchor="middle" fill="#888" font-size="12" font-weight="500">ReportsModule</text>

  <!-- Auth -> User (exports GetUserByEmailUseCase) -->
  <line x1="180" y1="140" x2="280" y2="140" stroke="#1D9E75" stroke-width="1" marker-end="url(#arr-green)"/>
  <text x="230" y="132" text-anchor="middle" fill="#1D9E75" font-size="9">GetUserByEmail</text>

  <!-- User -> Reports -->
  <line x1="400" y1="140" x2="500" y2="140" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-purple)"/>

  <!-- UserModule -> AccountsModule -->
  <line x1="340" y1="160" x2="340" y2="230" stroke="#7F77DD" stroke-width="1" marker-end="url(#arr-purple)"/>
  <text x="352" y="200" fill="#7F77DD" font-size="9">one to many</text>

  <!-- AccountsModule -->
  <rect x="240" y="232" width="200" height="40" rx="8" fill="#1a2a3a" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="255" text-anchor="middle" fill="#85b7eb" font-size="12" font-weight="500">AccountsModule</text>

  <!-- Accounts -> Transactions -->
  <line x1="290" y1="272" x2="200" y2="330" stroke="#BA7517" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Accounts -> Transfers -->
  <line x1="390" y1="272" x2="480" y2="330" stroke="#BA7517" stroke-width="1" marker-end="url(#arr)"/>
  <text x="352" y="308" fill="#888" font-size="9">account ops</text>

  <!-- TransactionsModule -->
  <rect x="80" y="332" width="200" height="52" rx="8" fill="#2a1a10" stroke="#BA7517" stroke-width="0.5"/>
  <text x="180" y="355" text-anchor="middle" fill="#EF9F27" font-size="12" font-weight="500">TransactionsModule</text>
  <text x="180" y="373" text-anchor="middle" fill="#666" font-size="9">income · expense — 1 cuenta</text>

  <!-- TransfersModule -->
  <rect x="400" y="332" width="200" height="52" rx="8" fill="#2a1a10" stroke="#BA7517" stroke-width="0.5"/>
  <text x="500" y="355" text-anchor="middle" fill="#EF9F27" font-size="12" font-weight="500">TransfersModule</text>
  <text x="500" y="373" text-anchor="middle" fill="#666" font-size="9">transfer — 2 cuentas, categoría especial</text>

  <!-- CategoriesModule -->
  <rect x="60" y="140" width="0" height="0"/>
  <rect x="60" y="420" width="160" height="40" rx="8" fill="#1a1a2a" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="140" y="443" text-anchor="middle" fill="#afa9ec" font-size="12" font-weight="500">CategoriesModule</text>

  <!-- BudgetsModule -->
  <rect x="460" y="420" width="160" height="40" rx="8" fill="#1a1a2a" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="540" y="443" text-anchor="middle" fill="#afa9ec" font-size="12" font-weight="500">BudgetsModule</text>

  <!-- User -> Categories -->
  <path d="M280 155 L140 155 L140 420" fill="none" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-purple)"/>

  <!-- Categories -> Budgets -->
  <line x1="220" y1="440" x2="460" y2="440" stroke="#7F77DD" stroke-width="1" marker-end="url(#arr-purple)"/>
  <text x="340" y="433" text-anchor="middle" fill="#7F77DD" font-size="9">one to one per period</text>

  <!-- Transactions -> Categories -->
  <line x1="180" y1="384" x2="180" y2="420" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-purple)"/>

  <!-- Legend -->
  <line x1="60" y1="486" x2="90" y2="486" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="96" y="490" fill="#888" font-size="9">exporta use case</text>
  <line x1="220" y1="486" x2="250" y2="486" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-purple)"/>
  <text x="256" y="490" fill="#888" font-size="9">depende de (one to many)</text>
  <line x1="430" y1="486" x2="460" y2="486" stroke="#BA7517" stroke-width="1" marker-end="url(#arr)"/>
  <text x="466" y="490" fill="#888" font-size="9">opera sobre cuentas</text>
</svg>
