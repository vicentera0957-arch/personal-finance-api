<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" style="background:#1a1a1a;font-family:sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Infrastructure -->
  <rect x="40" y="24" width="600" height="90" rx="12" fill="#2a2a2a" stroke="#5a5a5a" stroke-width="0.5"/>
  <text x="340" y="52" text-anchor="middle" fill="#d0d0d0" font-size="14" font-weight="500">Infrastructure</text>
  <text x="340" y="72" text-anchor="middle" fill="#888" font-size="11">Controller · DTOs HTTP · ORM Entity · Mapper · RepositoryImpl · Module</text>
  <text x="340" y="92" text-anchor="middle" fill="#666" font-size="10">Conoce todas las capas. Única capa con dependencias externas (NestJS, TypeORM, bcrypt)</text>

  <!-- Arrow infra to app -->
  <line x1="340" y1="114" x2="340" y2="148" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="352" y="135" fill="#666" font-size="10">conoce ↓</text>

  <!-- Application -->
  <rect x="100" y="150" width="480" height="78" rx="12" fill="#1a3a2a" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="178" text-anchor="middle" fill="#5dcaa5" font-size="14" font-weight="500">Application</text>
  <text x="340" y="198" text-anchor="middle" fill="#888" font-size="11">Use Cases — orquesta dominio, no toma decisiones de negocio</text>
  <text x="340" y="216" text-anchor="middle" fill="#666" font-size="10">Solo importa del dominio. Nunca importa de infraestructura directamente.</text>

  <!-- Arrow app to domain -->
  <line x1="340" y1="228" x2="340" y2="262" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="352" y="249" fill="#666" font-size="10">conoce ↓</text>

  <!-- Domain -->
  <rect x="160" y="264" width="360" height="100" rx="12" fill="#1e1a3a" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="292" text-anchor="middle" fill="#afa9ec" font-size="14" font-weight="500">Domain</text>
  <text x="340" y="312" text-anchor="middle" fill="#888" font-size="11">Entities · Value Objects · IRepository · Exceptions</text>
  <text x="340" y="330" text-anchor="middle" fill="#666" font-size="10">Cero dependencias externas. No conoce a nadie.</text>
  <text x="340" y="348" text-anchor="middle" fill="#666" font-size="10">Núcleo estable del sistema.</text>

  <!-- Prohibited arrow domain to infra -->
  <path d="M190 264 L120 210 L120 114" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow-red)"/>
  <text x="44" y="195" fill="#E24B4A" font-size="10">PROHIBIDO</text>
  <text x="44" y="208" fill="#E24B4A" font-size="10">domain → infra</text>

  <!-- Legend -->
  <line x1="60" y1="396" x2="100" y2="396" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="108" y="400" fill="#888" font-size="10">dependencia permitida</text>
  <line x1="310" y1="396" x2="350" y2="396" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow-red)"/>
  <text x="358" y="400" fill="#E24B4A" font-size="10">dependencia prohibida</text>
</svg>
